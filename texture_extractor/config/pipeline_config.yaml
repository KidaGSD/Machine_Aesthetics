# Main Configuration for Emotion-Driven Lamp Design Pipeline

# --- Input Data Paths ---
# Path to the directory containing original texture images (e.g., DTD dataset)
original_textures_dir: "data/dtd/images" 

# Path to the pre-generated audio emotion timeline CSV file
# This file should be generated by the audio_analysis component.
# Example: "../audio_analysis/machine_ase/luminote/valence_arousal_timeline.csv"
audio_timeline_path: "../audio_analysis/machine_ase/luminote/output_csv/trumpbiden.csv"

# Path to the emotion mapping definition (VAD ranges to emotion labels)
emotion_mapping_path: "config/emotion_mapping_vad.json"

# --- Output Directories ---
# Base directory for all generated results
results_base_dir: "results"

# Subdirectories within results_base_dir (relative paths)
classification_output_dir: "classification"
depth_maps_output_dir: "depth_maps"
timeline_output_dir: "timeline"       # For texture timeline JSON
blending_output_dir: "blending"       # For blended textures, displacement maps, previews
parametric_output_dir: "parametric"   # For lamp parameters (JSON, Rhino scripts)
evaluation_output_dir: "evaluation"   # For reports and visualizations

# --- Texture Preprocessing Settings ---
# Settings for texture_classifier.py (run via preprocess_textures.py)
classification:
  # Confidence threshold for filtering high-confidence images
  confidence_threshold: 0.3 # Lowered from 0.6
  # File to save the list of high-confidence image paths (relative to results_base_dir/classification_output_dir)
  high_confidence_list_filename: "high_confidence_images.txt"
  # File to save detailed classification scores (relative to results_base_dir/classification_output_dir)
  classification_results_filename: "classification_results.txt"

# Settings for depth_generator.py (run via preprocess_textures.py)
depth_generation:
  # MiDaS model type (e.g., "DPT_Large", "MiDaS_small") - DPT_Large recommended for quality
  model_type: "DPT_Large" 
  # Batch size for processing images (adjust based on GPU memory)
  batch_size: 4
  # Number of workers for DataLoader (0 often best on Windows)
  num_workers: 0

# --- Texture Mapping Settings ---
# Settings for texture_mapper.py
texture_mapping:
  # Fallback: If pre-computed texture emotions JSON is available (optional)
  # texture_emotions_path: "path/to/texture_emotions.json" 
  # File to save the generated texture timeline (relative to results_base_dir/timeline_output_dir)
  texture_timeline_filename: "texture_timeline.json"

# --- Texture Blending Settings ---
# Settings for texture_blender.py
texture_blending:
  # Target size for blended textures and displacement maps
  target_size: 512 
  # Gaussian blur kernel size for displacement maps (odd number, 0 to disable)
  blur_kernel: 5
  # Scaling factor for displacement map values (base scale)
  displacement_scale: 1.0
  # Multiplier applied to displacement_scale for final effect (e.g., 2.0 = double the scale)
  displacement_scale_multiplier: 2.0 
  # File to save animation data (relative to results_base_dir/blending_output_dir)
  animation_data_filename: "animation_data.json"
  # File to save blending results summary (relative to results_base_dir/blending_output_dir)
  blending_results_filename: "blending_results.json"

# --- Parametric Design Settings ---
# Settings for parametric_generator.py
parametric_design:
  # Base parameters for the lamp geometry
  base_radius: 100.0
  base_height: 200.0
  base_thickness: 2.0
  subdivisions: 128 # Angular subdivisions (Increased from 32)
  layers: 128       # Vertical subdivisions (Increased from 32)
  # Maximum displacement applied to radius based on displacement map
  displacement_scale: 25.0 # Slightly increased from 20.0
  # Smoothing factor for the geometry (implementation specific)
  smoothing: 0.5
  # Whether to generate 3D preview images
  visualize_previews: true 
  # File to save summary of generated design files (relative to results_base_dir/parametric_output_dir)
  design_results_filename: "lamp_design_results.json"

# --- General Settings ---
# Device preference ("cuda" or "cpu", None for auto-detect)
device: cuda

# --- Evaluation Settings ---
# Settings for evaluation_module.py
evaluation:
  # Number of samples for evaluating texture fusion quality
  texture_fusion_sample_size: 5
  # Number of samples for visualizing texture timeline
  texture_timeline_num_samples: 5
  # Number of samples for original vs blended visualization
  original_blended_num_samples: 5
  # Max samples per emotion for texture-depth gallery
  texture_depth_gallery_max_samples: 20
  # Samples per emotion for texture-depth grid
  texture_depth_grid_samples_per_emotion: 4
  # Max images for classification gallery
  classification_gallery_max_images: 200
  # Max images for classification grid
  classification_grid_max_images: 100
